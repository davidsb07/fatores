name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_REPO: DavidSB/Fatores

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push current snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote add space "https://huggingface.co/spaces/${HF_SPACE_REPO}"
          git push --force "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" main
